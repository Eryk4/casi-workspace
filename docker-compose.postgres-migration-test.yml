name: casi-postgres-migration-test

services:
  postgres-migration-test:
    image: postgres:16-alpine
    container_name: casi-postgres-migration-test
    environment:
      POSTGRES_DB: casi_migration_test
      POSTGRES_USER: casi_test
      POSTGRES_PASSWORD: casi_test_password
    ports:
      - "55432:5432"
    volumes:
      - casi_postgres_migration_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casi_test -d casi_migration_test"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: "no"

volumes:
  casi_postgres_migration_test_data:
    name: casi_postgres_migration_test_data
